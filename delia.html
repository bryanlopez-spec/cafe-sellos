<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delia – Café de la Flor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:linear-gradient(135deg,#1a1a2e,#16213e);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:linear-gradient(160deg,#fffdf7,#fdf0d8);border-radius:28px;width:360px;padding:26px 22px 22px;box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(200,151,58,.3);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#c8973a,#f0c060,#c8973a);border-radius:28px 28px 0 0;}
  .card-header{text-align:center;margin-bottom:14px;}
  .card-logo{width:145px;margin:0 auto 10px;display:block;}
  .turno-chip{display:inline-block;background:#2c1a0e;color:#f0c060;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:8px;}
  .card-name{font-family:'Playfair Display',serif;font-size:22px;color:#2c1a0e;}
  .readonly-badge{display:inline-block;background:rgba(200,151,58,.15);color:#c8973a;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:6px;border:1px solid rgba(200,151,58,.3);}
  .divider{height:1px;background:linear-gradient(90deg,transparent,#d4b896,transparent);margin:12px 0;}
  .sec{margin-bottom:12px;}
  .sec-head{display:flex;justify-content:space-between;margin-bottom:7px;}
  .sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;color:#c8973a;}
  .sec-cnt{font-size:11px;color:#9a7a5a;font-weight:600;}
  .sec-cnt b{color:#2c1a0e;}
  .stamps-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
  .stamp{width:38px;height:38px;border-radius:50%;border:2px dashed #c8a96e;background:rgba(255,249,240,.8);position:relative;display:flex;align-items:center;justify-content:center;transition:all .3s;}
  .stamp.done{background:linear-gradient(135deg,#2c1a0e,#4a2e14);border:2px solid #c8973a;box-shadow:0 3px 10px rgba(44,26,14,.35);}
  .stamp.done::after{content:'✓';font-size:18px;color:#f0c060;font-weight:700;position:absolute;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
  .stamp.pop{animation:pop .4s ease;}
  .pbar{height:4px;background:rgba(200,169,110,.25);border-radius:4px;overflow:hidden;}
  .pfill{height:100%;background:linear-gradient(90deg,#c8973a,#f0c060);border-radius:4px;transition:width .4s ease;}
  .card-footer{margin-top:14px;border-top:1px solid rgba(212,184,150,.4);padding-top:12px;text-align:center;}
  .footer-msg{font-size:10px;color:#b0896a;letter-spacing:.8px;}
</style>
</head>

<script>
// Esta función es llamada desde el panel del capitán via localStorage
function syncFromStorage() {
  const data = JSON.parse(localStorage.getItem('sellos-delia') || '{}');
    syncSection('delia','encuestas',5,data['encuestas']||0);
  syncSection('delia','mimosas',3,data['mimosas']||0);
  syncSection('delia','galletas',5,data['galletas']||0);
  syncSection('delia','pan',4,data['pan']||0);
  syncSection('delia','pastel',10,data['pastel']||0);
}
function syncSection(mesero, key, total, count) {
  for (let i=0;i<total;i++) {
    const s=document.getElementById(mesero+'-'+key+'-'+i);
    if(s){ if(i<count){s.classList.add('done');}else{s.classList.remove('done');} }
  }
  const cnt=document.getElementById(mesero+'-'+key+'-count');
  if(cnt) cnt.textContent=count;
  const bar=document.getElementById(mesero+'-'+key+'-bar');
  if(bar) bar.style.width=(count/total*100)+'%';
}
syncFromStorage();
window.addEventListener('storage', syncFromStorage);
setInterval(syncFromStorage, 3000);
</script>
